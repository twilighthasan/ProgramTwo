<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bazaar Polski — Разговорник</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap');

:root {
–bg: #1a1a1a;
–card: #262626;
–card-hover: #303030;
–accent: #d4a04a;
–accent2: #c4943e;
–text: #e8e4e0;
–text2: #8a8580;
–trans: #d4a04a;
–rus: #b0aba6;
–cat-bg: #2a2a2a;
–shadow: 0 2px 12px rgba(0,0,0,.3);
color-scheme: dark;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
width:100%; height:100%;
background: var(–bg);
color: var(–text);
font-family: ‘Nunito’, sans-serif;
overflow: hidden;
touch-action: manipulation;
-webkit-font-smoothing: antialiased;
}

.app {
display: flex;
flex-direction: column;
height: 100vh;
height: 100dvh;
}

.header {
flex-shrink: 0;
padding: 14px 16px 10px;
background: #222;
border-bottom: 1px solid #333;
text-align: center;
}
.header h1 {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
color: var(–accent);
letter-spacing: 1px;
}
.header .sub {
font-size: 11px;
color: var(–text2);
margin-top: 3px;
}

.search-wrap {
flex-shrink: 0;
padding: 8px 12px;
background: var(–bg);
position: relative;
}
.search-wrap input {
width: 100%;
padding: 10px 14px 10px 38px;
border-radius: 20px;
border: 1px solid #3a3a3a;
background: #2a2a2a;
color: var(–text);
font-size: 15px;
font-family: ‘Nunito’, sans-serif;
outline: none;
transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(–accent); }
.search-wrap input::placeholder { color: #666; }
.search-wrap .icon {
position: absolute;
left: 24px;
top: 50%;
transform: translateY(-50%);
color: var(–text2);
font-size: 16px;
pointer-events: none;
}

.cats {
flex-shrink: 0;
display: flex;
gap: 6px;
padding: 4px 12px 8px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.cats::-webkit-scrollbar { display:none; }
.cat-btn {
flex-shrink: 0;
padding: 7px 14px;
border-radius: 20px;
border: 1px solid #3a3a3a;
background: #2a2a2a;
color: #999;
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: all .2s;
white-space: nowrap;
font-family: ‘Nunito’, sans-serif;
}
.cat-btn.active {
background: var(–accent);
color: #1a1a1a;
border-color: var(–accent);
font-weight: 700;
}

.list {
flex: 1;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
padding: 0 12px 80px;
}

.phrase {
background: #2a2a2a;
border-radius: 12px;
padding: 12px 14px;
margin-bottom: 8px;
border-left: 3px solid var(–accent);
transition: background .15s;
position: relative;
}
.phrase:active { background: #333; }

.phrase .num {
position: absolute;
top: 8px;
right: 12px;
font-size: 10px;
color: var(–text2);
opacity: .5;
}

.phrase .de {
font-size: 16px;
font-weight: 700;
color: var(–text);
line-height: 1.3;
margin-bottom: 4px;
padding-right: 30px;
}

.phrase .tr {
font-size: 14px;
color: var(–trans);
line-height: 1.3;
margin-bottom: 3px;
font-style: italic;
}

.phrase .ru {
font-size: 13px;
color: var(–rus);
line-height: 1.3;
}

.cat-label {
font-family: ‘Playfair Display’, serif;
font-size: 15px;
color: var(–accent);
padding: 14px 0 6px;
border-bottom: 1px solid #333;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 8px;
}

.count-badge {
background: var(–accent);
color: #1a1a1a;
font-family: ‘Nunito’, sans-serif;
font-size: 11px;
font-weight: 700;
padding: 1px 8px;
border-radius: 10px;
}

.empty {
text-align: center;
padding: 40px 20px;
color: var(–text2);
font-size: 14px;
}

.top-btn {
position: fixed;
bottom: 20px;
right: 16px;
width: 44px;
height: 44px;
border-radius: 50%;
background: var(–accent);
color: #1a1a1a;
border: none;
font-size: 20px;
font-weight: 700;
box-shadow: var(–shadow);
cursor: pointer;
display: none;
align-items: center;
justify-content: center;
z-index: 10;
touch-action: manipulation;
}
.top-btn.show { display: flex; }
</style>

</head>

    ["Niestety, to się wyprzedało.", "Нестэ́ты, то ще выпшэда́во.", "К сожалению, это распродано."],
    ["Pokażę Państwu coś innego.", "Пока́жэ па́ньстфу цощь и́ннэго.", "Я покажу вам кое-что другое."],
    ["To jest zupełnie nowe!", "То ест зупэ́вне но́вэ!", "Это совсем новое!"],
    ["Mówię trochę po polsku.", "Му́ве тро́хэ по по́льску.", "Я немного говорю по-польски."],
    ["Mogę Państwu coś pokazać?", "Могэ́ па́ньстфу цощь пока́зачь?", "Можно вам кое-что показать?"],
    ["Czego Państwo szukają?", "Чэ́го па́ньстфо шу́каён?", "Что вы ищете?"],
    ["Dla siebie czy na prezent?", "Для ще́бе чы на прэ́зэнт?", "Для себя или в подарок?"],
    ["Bez pośpiechu, proszę się rozglądać!", "Бэс пощпе́ху, про́шэ ще розглё́ндачь!", "Без спешки, смотрите спокойно!"],
    ["Może coś do picia? Herbata, woda?", "Мо́жэ цощь до пи́ча? Хэрба́та, во́да?", "Хотите что-нибудь выпить? Чай, воду?"],
    ["Chętnie pomogę.", "Хэ́нтне помогэ́.", "Я с радостью помогу."],
  ]},
];

let currentCat = "all";

function init() {
  const catsEl = document.getElementById('cats');
  let total = 0;
  DATA.forEach(c => total += c.phrases.length);

  let html = `<button class="cat-btn active" onclick="setCat('all')">Все (${total})</button>`;
  DATA.forEach((c, i) => {
    html += `<button class="cat-btn" onclick="setCat(${i})">${c.cat.split(' ')[0]} ${c.cat.split(' ').slice(1).join(' ')} (${c.phrases.length})</button>`;
  });
  catsEl.innerHTML = html;
  render();
}

function setCat(c) {
  currentCat = c;
  document.querySelectorAll('.cat-btn').forEach((b, i) => {
    b.classList.toggle('active', (c === 'all' && i === 0) || (c === i - 1));
  });
  document.getElementById('search').value = '';
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const listEl = document.getElementById('list');
  let html = '';
  let num = 0;

  const cats = currentCat === 'all' ? DATA : [DATA[currentCat]];

  cats.forEach(c => {
    let catPhrases = '';
    let count = 0;
    c.phrases.forEach(p => {
      const match = !q || p[0].toLowerCase().includes(q) || p[1].toLowerCase().includes(q) || p[2].toLowerCase().includes(q);
      if (!match) return;
      num++;
      count++;
      catPhrases += `<div class="phrase">
        <div class="num">${num}</div>
        <div class="de">${p[0]}</div>
        <div class="tr">${p[1]}</div>
        <div class="ru">${p[2]}</div>
      </div>`;
    });
    if (count > 0) {
      html += `<div class="cat-label">${c.cat} <span class="count-badge">${count}</span></div>` + catPhrases;
    }
  });

  if (!html) {
    html = '<div class="empty">Ничего не найдено 😕</div>';
  }

  listEl.innerHTML = html;
  listEl.scrollTop = 0;
}

document.getElementById('search').addEventListener('input', render);

document.getElementById('list').addEventListener('scroll', function() {
  document.getElementById('topBtn').classList.toggle('show', this.scrollTop > 300);
});

function scrollTop() {
  document.getElementById('list').scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
