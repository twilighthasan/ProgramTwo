<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Çitello — Прайс-лист</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --card: #1a1814;
    --border: #2e2a22;
    --gold: #c9954a;
    --gold2: #e8c070;
    --text: #f0ead8;
    --muted: #8a8070;
    --red: #c0392b;
    --green: #27ae60;
    --tag-bg: #252018;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Nunito’, sans-serif;
min-height: 100vh;
padding: 0 0 40px 0;
}

/* HEADER */
.header {
background: linear-gradient(135deg, #1a1510 0%, #2a1f0e 50%, #1a1510 100%);
border-bottom: 2px solid var(–gold);
padding: 28px 20px 20px;
text-align: center;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 4px 30px rgba(0,0,0,0.6);
}

.header-brand {
font-family: ‘Playfair Display’, serif;
font-size: 2.2rem;
font-weight: 900;
letter-spacing: 0.1em;
background: linear-gradient(135deg, var(–gold), var(–gold2), var(–gold));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-transform: uppercase;
}

.header-sub {
font-size: 0.75rem;
color: var(–muted);
letter-spacing: 0.25em;
text-transform: uppercase;
margin-top: 4px;
}

/* SEARCH */
.search-wrap {
padding: 16px 16px 8px;
position: sticky;
top: 86px;
z-index: 99;
background: var(–bg);
}

.search-input {
width: 100%;
background: var(–card);
border: 1.5px solid var(–border);
border-radius: 12px;
padding: 12px 16px 12px 42px;
color: var(–text);
font-family: ‘Nunito’, sans-serif;
font-size: 0.95rem;
outline: none;
transition: border-color 0.2s;
}

.search-input:focus { border-color: var(–gold); }
.search-input::placeholder { color: var(–muted); }

.search-icon {
position: absolute;
left: 28px;
top: 50%;
transform: translateY(-50%);
color: var(–muted);
font-size: 1rem;
pointer-events: none;
}

/* CATEGORY TABS */
.tabs-wrap {
padding: 10px 0 6px 16px;
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }

.tab {
white-space: nowrap;
padding: 7px 16px;
border-radius: 20px;
border: 1.5px solid var(–border);
background: var(–card);
color: var(–muted);
font-size: 0.78rem;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
touch-action: manipulation;
letter-spacing: 0.04em;
}

.tab.active {
background: var(–gold);
border-color: var(–gold);
color: #1a1510;
}

/* STATS BAR */
.stats-bar {
display: flex;
gap: 12px;
padding: 8px 16px 12px;
overflow-x: auto;
scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }

.stat-chip {
flex-shrink: 0;
background: var(–tag-bg);
border: 1px solid var(–border);
border-radius: 8px;
padding: 6px 12px;
font-size: 0.72rem;
color: var(–muted);
}

.stat-chip strong { color: var(–gold2); font-size: 0.85rem; }

/* PRODUCT LIST */
.list {
padding: 0 12px;
display: flex;
flex-direction: column;
gap: 8px;
}

/* SECTION HEADER */
.section-header {
display: flex;
align-items: center;
gap: 10px;
padding: 16px 4px 6px;
}

.section-title {
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
color: var(–gold2);
font-weight: 700;
letter-spacing: 0.05em;
}

.section-line {
flex: 1;
height: 1px;
background: var(–border);
}

/* PRODUCT CARD */
.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
padding: 12px 14px;
display: flex;
align-items: center;
gap: 12px;
transition: border-color 0.2s, transform 0.15s;
touch-action: manipulation;
}

.card:active { transform: scale(0.98); }

.card-icon {
width: 44px;
height: 44px;
border-radius: 10px;
background: var(–tag-bg);
border: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.4rem;
flex-shrink: 0;
}

.card-info {
flex: 1;
min-width: 0;
}

.card-name {
font-size: 0.82rem;
font-weight: 700;
color: var(–text);
line-height: 1.3;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.card-meta {
display: flex;
align-items: center;
gap: 6px;
margin-top: 4px;
}

.card-code {
font-size: 0.68rem;
color: var(–muted);
background: var(–tag-bg);
border: 1px solid var(–border);
padding: 2px 7px;
border-radius: 5px;
font-weight: 600;
}

.card-size {
font-size: 0.68rem;
color: var(–muted);
}

.card-price-wrap {
text-align: right;
flex-shrink: 0;
}

.price-converted {
font-family: ‘Playfair Display’, serif;
font-size: 1.35rem;
font-weight: 900;
color: var(–gold2);
line-height: 1;
}

.price-currency {
font-size: 0.7rem;
font-weight: 700;
color: var(–gold);
display: block;
letter-spacing: 0.05em;
margin-top: 2px;
}

.price-original {
font-size: 0.65rem;
color: var(–muted);
margin-top: 2px;
}

/* NO RESULTS */
.no-results {
text-align: center;
padding: 50px 20px;
color: var(–muted);
font-size: 0.9rem;
}

.no-results span { font-size: 2rem; display: block; margin-bottom: 10px; }

/* HIDDEN */
.hidden { display: none !important; }

/* COUNT BADGE */
.count-badge {
display: inline-block;
background: var(–border);
color: var(–muted);
border-radius: 10px;
padding: 1px 8px;
font-size: 0.68rem;
font-weight: 700;
margin-left: 4px;
}

.footer {
text-align: center;
padding: 24px;
color: var(–muted);
font-size: 0.72rem;
letter-spacing: 0.08em;
text-transform: uppercase;
}
</style>

</head>
<body>

<div class="header">
  <div class="header-brand">Çitello</div>
  <div class="header-sub">Прайс-лист · цены в €</div>
</div>

<div class="search-wrap" style="position:relative;">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" id="searchInput" placeholder="Поиск по названию или коду..." oninput="filterProducts()">
</div>

<div class="tabs-wrap" id="tabsWrap">
  <button class="tab active" onclick="filterCategory('all', this)">Все</button>
  <button class="tab" onclick="filterCategory('nut', this)">🥜 Орехи</button>
  <button class="tab" onclick="filterCategory('seed', this)">🌻 Семечки</button>
  <button class="tab" onclick="filterCategory('dry', this)">🍇 Сухофрукты</button>
  <button class="tab" onclick="filterCategory('snack', this)">🍿 Снеки</button>
  <button class="tab" onclick="filterCategory('mix', this)">🎯 Миксы</button>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="list" id="productList"></div>

<div class="no-results hidden" id="noResults">
  <span>🔎</span>
  Ничего не найдено
</div>

<div class="footer">Çitello · Все цены в евро (€)</div>

<script>
// ── КОНВЕРТАЦИЯ: tlPrice / 52.6 → округл вверх до 0.5 → × 2 = целое
const RATE = 52.6;

function convert(tlPrice) {
  const raw = tlPrice / RATE;              // напр. 3.23
  const rounded = Math.ceil(raw * 2) / 2; // вверх до 0.5 → 3.5
  return Math.round(rounded * 2);          // × 2 → целое: 7
}

function formatEur(val) {
  return val.toString();
}

// ── КАТЕГОРИИ
const CAT = {
  nut: ['FINDIK', 'BADEM', 'KAJU', 'FISTIK', 'ANTEP', 'YER FIST'],
  seed: ['ÇEKİRDEK', 'LEBLEBI', 'LEBLEBİ'],
  dry: ['KURUSU', 'KAYISI', 'MANGO', 'PAPAYA', 'KİVİ', 'ANANAS', 'POMELO', 'MUZ', 'TURNA', 'ÇİLEK', 'HİNDİSTAN'],
  snack: ['MISIR', 'TACO', 'CİPS'],
  mix: ['KARIŞIK']
};

function getCategory(name) {
  const upper = name.toUpperCase();
  for (const [cat, keywords] of Object.entries(CAT)) {
    if (keywords.some(k => upper.includes(k))) return cat;
  }
  return 'other';
}

function getEmoji(name) {
  const u = name.toUpperCase();
  if (u.includes('FINDIK') || u.includes('FINDIK')) return '🌰';
  if (u.includes('BADEM')) return '🫘';
  if (u.includes('KAJU')) return '🥜';
  if (u.includes('ANTEP') || u.includes('FISTIK') || u.includes('FİSTİK')) return '🟢';
  if (u.includes('YER FIST') || u.includes('YER FİST')) return '🥜';
  if (u.includes('ÇEKİRDEK') || u.includes('CEKİRDEK')) return '🌻';
  if (u.includes('LEBLEBİ') || u.includes('LEBEBI')) return '⚪';
  if (u.includes('KURUSU') || u.includes('KAYISI') || u.includes('MANGO') || u.includes('KİVİ') || u.includes('ANANAS') || u.includes('POMELO') || u.includes('MUZ') || u.includes('TURNA') || u.includes('ÇİLEK') || u.includes('HİNDİSTAN')) return '🍇';
  if (u.includes('MISIR') || u.includes('MISIIR')) return '🌽';
  if (u.includes('CİPS') || u.includes('CIPS')) return '🍿';
  if (u.includes('KARIŞIK') || u.includes('KARISIK')) return '🎯';
  return '📦';
}

// ── ПРОДУКТЫ (из двух страниц накладной)
const PRODUCTS = [
  // СТРАНИЦА 1
  { code: '2047', name: 'Çitello Barbekü Soslu Mısır 250 GR×16', price: 35.1 },
  { code: '2039', name: 'Çitello Cips Soslu Fıstık 250 GR×20', price: 47.8 },
  { code: '', name: 'Çitello Fındık İçi Ordu 250 GR×20', price: 345.31 },
  { code: '', name: 'Çitello Kavrulmuş Kaju Fıstık 250 GR×20', price: 170 },
  { code: '', name: 'Çitello Lüx Karışık Çerez 250 GR×20', price: 154 },
  { code: '2031', name: 'Çitello Naturel Antep Fıstık 250 GR×20', price: 377.2 },
  { code: '2036', name: 'Çitello Susamlı Fıstık 250 GR×20', price: 47.8 },
  { code: '2034', name: 'Çitello Tuzlu Fıstık İçi 250 GR×20', price: 49.95 },
  { code: '2405', name: 'Çitello Zarli Tuzlu Fındık İçi 250 GR×20', price: 297.5 },
  { code: '2008', name: 'Çitello Antep Fıstığı 150 GR×12', price: 240 },
  { code: '2007', name: 'Çitello Antep Fıstığı 80 GR×10', price: 130 },
  { code: '2020', name: 'Çitello Badem İçi 150 GR×12', price: 113 },
  { code: '2019', name: 'Çitello Badem İçi 80 GR×10', price: 61 },
  { code: '2044', name: 'Çitello Bol Tuzlu Siyah Çekirdek 150 GR×15', price: 32.5 },
  { code: '2010', name: 'Çitello Fındık İçi 150 GR×12', price: 212 },
  { code: '2009', name: 'Çitello Fındık İçi 80 GR×10', price: 114 },
  { code: '2468', name: 'Çitello Gold Karışık Çerez 150 GR×10', price: 225 },
  { code: '2466', name: 'Çitello Gold Karışık Çerez 80 GR×10', price: 125 },
  { code: '2051', name: 'Çitello Golden Soslu Mısır 120 GR×12', price: 30 },
  { code: '2052', name: 'Çitello Golden Soslu Mısır 55 GR×10', price: 14 },
  { code: '2018', name: 'Çitello Kabak Çekirdeği Tuzlu 130 GR×10', price: 62 },
  { code: '2017', name: 'Çitello Kabak Çekirdeği Tuzlu 65 GR×10', price: 31.5 },
  { code: '2022', name: 'Çitello Kaju Kavrulmuş 130 GR×12', price: 94 },
  { code: '2021', name: 'Çitello Kaju Kavrulmuş 75 GR×10', price: 55 },
  { code: '2464', name: 'Çitello Kaplamalı Cips Fıstık 200 GR×12', price: 46 },
  { code: '2053', name: 'Çitello Kuru Kayısı 150 GR×12', price: 126 },
  { code: '2014', name: 'Çitello Tuzlu Sarı Leblebi 80 GR×10', price: 25.75 },

  // СТРАНИЦА 2
  { code: '', name: 'Çitello Tuzlu Siyah Çekirdek 150 GR×15', price: 32.5 },
  { code: '', name: 'Çitello Tuzsuz Siyah Çekirdek 150 GR×15', price: 32.5 },
  { code: '', name: 'Çitello Yer Fıstığı Taco Soslu (BBQ) 80 GR×10', price: 19 },
  { code: '', name: 'Çitello Yer Fıstığı Tuzlu 150 GR×12', price: 37.5 },
  { code: '', name: 'Çitello Yer Fıstığı Tuzlu 80 GR×10', price: 20.4 },
  { code: '', name: 'Çitello Yer Fıstığı Yağlı 80 GR×10', price: 19 },
  { code: '', name: 'Çitello Çifte Kavrulmuş Sarı Leblebi 80 GR×10', price: 25.75 },
  { code: '', name: 'Çitello Özel Karışık Çerez 150 GR×12', price: 115 },
  { code: '', name: 'Çitello Özel Karışık Çerez 80 GR×10', price: 60 },
  { code: '', name: 'Çitello Hindistan Cevizi Kurusu 200 GR', price: 108.4 },
  { code: '', name: 'Çitello Muz Kurusu 150 GR', price: 59 },
  { code: '', name: 'Çitello Pomelo Kurusu 200 GR', price: 82.3 },
  { code: '', name: 'Çitello Ananas Kurusu 250 GR', price: 119.5 },
  { code: '', name: 'Çitello Kurutulmuş Kivi 200 GR', price: 68 },
  { code: '', name: 'Çitello Papaya Kurusu 250 GR', price: 90.3 },
  { code: '', name: 'Çitello Mango Kurusu 250 GR', price: 132.8 },
  { code: '', name: 'Çitello Turna Yemiş Kurusu 250 GR', price: 118.2 },
  { code: '', name: 'Çitello Çilek Kurusu 250 GR', price: 140.8 },
];

let currentCategory = 'all';
let currentSearch = '';

function renderStats() {
  const total = PRODUCTS.length;
  const minP = Math.min(...PRODUCTS.map(p => convert(p.price)));
  const maxP = Math.max(...PRODUCTS.map(p => convert(p.price)));
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip">Товаров: <strong>${total}</strong></div>
    <div class="stat-chip">От <strong>€${formatEur(minP)}</strong></div>
    <div class="stat-chip">До <strong>€${formatEur(maxP)}</strong></div>
    <div class="stat-chip">Курс: <strong>52.6 ₺ = €1 × 2</strong></div>
  `;
}

function renderProducts() {
  const list = document.getElementById('productList');
  const noRes = document.getElementById('noResults');
  const search = currentSearch.toLowerCase();

  const filtered = PRODUCTS.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.code.includes(search);
    const cat = getCategory(p.name);
    const matchCat = currentCategory === 'all' || cat === currentCategory;
    return matchSearch && matchCat;
  });

  if (filtered.length === 0) {
    list.innerHTML = '';
    noRes.classList.remove('hidden');
    return;
  }
  noRes.classList.add('hidden');

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    const cat = getCategory(p.name);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  const catLabels = {
    nut: '🥜 Орехи',
    seed: '🌻 Семечки и снеки',
    dry: '🍇 Сухофрукты',
    snack: '🍿 Снеки',
    mix: '🎯 Каришики',
    other: '📦 Прочее'
  };

  let html = '';
  const catOrder = ['nut', 'mix', 'seed', 'snack', 'dry', 'other'];

  catOrder.forEach(cat => {
    if (!groups[cat]) return;
    if (currentCategory === 'all') {
      html += `<div class="section-header">
        <span class="section-title">${catLabels[cat] || cat}</span>
        <span class="count-badge">${groups[cat].length}</span>
        <div class="section-line"></div>
      </div>`;
    }
    groups[cat].forEach(p => {
      const usd = convert(p.price);
      const emoji = getEmoji(p.name);
      // Extract size from name
      const sizeMatch = p.name.match(/(\d+\s*GR[×x\*]?\d*)/i);
      const size = sizeMatch ? sizeMatch[0].replace(/[×x\*]/, '×') : '';
      // Short name (remove Çitello prefix and size at end)
      let shortName = p.name
        .replace(/^Çitello\s*/i, '')
        .replace(/\s*\d+\s*GR[×x\*]?\d*\s*$/i, '')
        .trim();

      html += `<div class="card" data-cat="${getCategory(p.name)}">
        <div class="card-icon">${emoji}</div>
        <div class="card-info">
          <div class="card-name">${shortName}</div>
          <div class="card-meta">
            ${p.code ? `<span class="card-code">#${p.code}</span>` : ''}
            ${size ? `<span class="card-size">${size}</span>` : ''}
          </div>
        </div>
        <div class="card-price-wrap">
          <div class="price-converted">€${formatEur(usd)}</div>
          <span class="price-currency">Евро</span>
          <div class="price-original">${p.price} ₺</div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function filterProducts() {
  currentSearch = document.getElementById('searchInput').value;
  renderProducts();
}

// INIT
renderStats();
renderProducts();
</script>

</body>
</html>
